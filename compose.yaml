name: learning-log-app

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      args:
        LOCAL_UID: ${LOCAL_UID:-1000}
        LOCAL_GID: ${LOCAL_GID:-1000}
    working_dir: /var/www/html
    environment:
      HOME: /tmp
      COMPOSER_HOME: /tmp/composer
      APP_URL: http://localhost:${BACKEND_PORT:-8081}
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-learning_log_app}
      DB_USERNAME: ${DB_USERNAME:-learning_log_user}
      DB_PASSWORD: ${DB_PASSWORD:-learning_log_password}
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  nginx:
    image: nginx:1.28-alpine
    ports:
      - "${BACKEND_PORT:-8081}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    working_dir: /app
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    environment:
      HOME: /tmp
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-8081}/api
    command: npm run dev -- --hostname 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - nginx
    networks:
      - app

  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-learning_log_app}
      MYSQL_USER: ${DB_USERNAME:-learning_log_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-learning_log_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - app

  phpmyadmin:
    image: phpmyadmin:5.2
    ports:
      - "${PHPMYADMIN_PORT:-8082}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

volumes:
  mysql_data:

networks:
  app:
    driver: bridge
